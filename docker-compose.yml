services:
  ligretto-scorekeeper:
    build:
      context: .
    image: ligretto-scorekeeper:latest
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_PATH: /data/ligretto.db
      AUTH_PASSWORD: ${AUTH_PASSWORD:-ligretto-admin}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret}
    volumes:
      - ./data:/data
    restart: unless-stopped
